# Alembic config for the agent service.
#
# Migration scripts live in `src/clinical_copilot/db/migrations`. Versions
# live in the same directory (no `versions/` subdirectory) so the path on
# disk matches what TASKS.md and ARCHITECTURE.md reference.
#
# `sqlalchemy.url` is intentionally blank — `env.py` reads the DSN from
# `Settings.database_url` so dev (SQLite) and prod (Postgres) share one
# code path.

[alembic]
script_location = src/clinical_copilot/db/migrations
version_locations = %(here)s/src/clinical_copilot/db/migrations/versions
prepend_sys_path = src
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
